events {
    worker_connections 1024;
}

http {
    log_format debug
      '$remote_addr:$remote_port '
      'conn=$connection '
      'req=$request_id '
      'upstream=$upstream_addr '
      'uct=$upstream_connect_time '
      'urt=$upstream_response_time '
      'status=$status';

    # Define upstream backend pool with 2 FastAPI servers
    upstream fastapi_backend {
        # Round-robin load balancing (default)
        # Requests alternate: fastapi1 -> fastapi2 -> fastapi1 -> ...

        server fastapi1:8000 max_fails=3 fail_timeout=30s;
        server fastapi2:8000 max_fails=3 fail_timeout=30s;

        # max_fails=3: Mark server down after 3 consecutive failures
        # fail_timeout=30s: Wait 30 seconds before retrying failed server
    }

    server {
        listen 80; # Nginx listens on port 80
        server_name localhost;

        # Logging
        access_log /var/log/nginx/access.log debug;
        error_log /var/log/nginx/error.log;

        # Proxy all requests to FastAPI backend pool
        location / {
            # Forward to upstream backend pool
            proxy_pass http://fastapi_backend;

            # Preserve original request information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable buffering for real-time responses
            proxy_buffering off;
        }
    }
}
