name: CollabNote Integration Automation

on:
  push:
    branches:
      - main

jobs:
  push-to-docker-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up --build -d

      - name: Run Tests
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pytest ./tests/
          flake8 ./app/

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag images for Docker Hub
        run: |
          docker tag app:fastapi1  ${{ secrets.DOCKERHUB_USERNAME }}/app:fastapi1
          docker tag app:fastapi2  ${{ secrets.DOCKERHUB_USERNAME }}/app:fastapi2
          docker tag app:consumer  ${{ secrets.DOCKERHUB_USERNAME }}/app:consumer
          docker tag app:migration ${{ secrets.DOCKERHUB_USERNAME }}/app:migration

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:fastapi1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:fastapi2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:consumer
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:migration
